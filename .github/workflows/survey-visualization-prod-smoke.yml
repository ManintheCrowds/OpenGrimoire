# Production-mode smoke: survey read gate matrix (NODE_ENV=production).
# Replaces one-off curl with scripts/survey-read-gate-prod-smoke.mjs (OG-GUI-10).
name: Survey read gate prod smoke

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  survey-read-gate-prod-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Survey read gate prod smoke (matrix)
        run: npm run verify:survey-read-prod
        env:
          SKIP_BUILD: "1"
